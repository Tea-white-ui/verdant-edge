spring:
  application:
    name: verdant-edge
  datasource:
    url: jdbc:mysql://${verdant.datasource.host}:${verdant.datasource.port}/${verdant.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
    username: ${verdant.datasource.username}
    password: ${verdant.datasource.password}
    driver-class-name: com.mysql.cj.jdbc.Driver

# MP 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 开启 SQL 日志，方便调试
  global-config:
    db-config:
      id-type: auto # 主键策略：数据库自增

logging:
  level:
    edge:
      verdant:
        mapper: debug
        service: info
        controller: info

verdant:
  jwt:
    # 设置jwt签名加密时使用的秘钥
    admin-secret-key: verdant
    # 设置jwt过期时间 83天
    admin-ttl: 720000000
    # 设置前端传递过来的令牌名称
    admin-token-name: token

  alioss: # oss
    endpoint:
    access-key-id:
    access-key-secret:
    bucket-name: bucket-name